        <p>Podgląd kalendarza. Planowanie i przypisywanie terminów pojawi się w kolejnej iteracji.</p>

<script src="app.js"></script>
<script>
  (function () {
    var grid = document.getElementById('calendar-grid');
    var title = document.getElementById('cal-title');
    var prevBtn = document.getElementById('cal-prev');
    var nextBtn = document.getElementById('cal-next');

    var monthNames = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
    var weekDays = ['Pon','Wt','Śr','Czw','Pt','Sob','Nd'];

    var today = new Date();
    var viewYear = today.getFullYear();
    var viewMonth = today.getMonth();

    function appendDay(num, muted, isToday) {
      var cell = document.createElement('div');
      cell.className = 'calendar-day' + (muted ? ' is-muted' : '') + (isToday ? ' is-today' : '');
      cell.textContent = num;
      grid.appendChild(cell);
    }

    function render() {
      grid.innerHTML = '';

      weekDays.forEach(function (d) {
        var el = document.createElement('div');
        el.className = 'calendar-weekday';
        el.textContent = d;
        grid.appendChild(el);
      });

      var firstOfMonth = new Date(viewYear, viewMonth, 1);
      var firstWeekday = (firstOfMonth.getDay() + 6) % 7; // Pon = 0
      var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      var daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

      for (var i = firstWeekday - 1; i >= 0; i--) {
        appendDay(daysInPrevMonth - i, true);
      }
      for (var d = 1; d <= daysInMonth; d++) {
        var isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
        appendDay(d, false, isToday);
      }
      var totalCells = firstWeekday + daysInMonth;
      var remaining = (7 - (totalCells % 7)) % 7;
      for (var t = 1; t <= remaining; t++) {
        appendDay(t, true);
      }

      title.textContent = monthNames[viewMonth] + ' ' + viewYear;
    }

    prevBtn.addEventListener('click', function () {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      render();
    });

    nextBtn.addEventListener('click', function () {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      render();
    });

    render();
  })();
</script>
