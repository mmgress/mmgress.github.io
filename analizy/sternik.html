<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sternik — logowanie</title>
<meta name="description" content="Sternik — system kierowania zadaniami. Panel logowania.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grid-overlay" aria-hidden="true"></div>

  <div class="page">

    <header class="brand">
      <div class="brand-mark">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="brand-eyebrow">System kierowania zadaniami</span>
      </div>
      <h1>Sternik</h1>
      <p class="brand-tagline">Zaloguj się, aby przejść do panelu</p>
    </header>

    <main class="login-card">
      <form id="login-form" novalidate>

        <div class="field">
          <label class="field-label" for="email">Identyfikator</label>
          <div class="input-wrap">
            <input type="text" id="email" name="email" placeholder="np. jan.kowalski@firma.pl" autocomplete="username" required>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="password">Hasło</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-visibility" id="toggle-password" data-visible="false" aria-label="Pokaż hasło">
              <svg class="icon-shown" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 7 11 7a20.5 20.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
            </button>
          </div>
        </div>

        <div class="row-between">
          <label class="remember">
            <input type="checkbox" id="remember" name="remember">
            Zapamiętaj mnie
          </label>
          <a href="#" class="link-muted">Nie pamiętasz hasła?</a>
        </div>

        <button type="submit" id="submit-btn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-label">Zaloguj się</span>
        </button>

        <p class="form-message" id="form-message" role="status" aria-live="polite"></p>

        <p class="access-note">Dostęp mają wyłącznie zaproszeni użytkownicy.</p>
      </form>
    </main>

    <footer class="site-footer">
      <span>© 2026 MMGRESS</span>
      <span class="divider">·</span>
      <a href="https://mmgress.github.io" target="_blank" rel="noopener">mmgress.github.io</a>
      <span class="divider">·</span>
      <span>Wszelkie prawa zastrzeżone</span>
    </footer>

  </div>

<script>
  // Przełącznik widoczności hasła
  var toggleBtn = document.getElementById('toggle-password');
  var passwordInput = document.getElementById('password');

  toggleBtn.addEventListener('click', function () {
    var isVisible = toggleBtn.getAttribute('data-visible') === 'true';
    toggleBtn.setAttribute('data-visible', String(!isVisible));
    toggleBtn.setAttribute('aria-label', isVisible ? 'Pokaż hasło' : 'Ukryj hasło');
    passwordInput.type = isVisible ? 'password' : 'text';
  });

  // Obsługa logowania — wersja przed-MVP.
  // UWAGA (dev): brak backendu — każde niepuste logowanie i hasło jest
  // akceptowane i zakładana jest sesja demonstracyjna w sessionStorage.
  // Docelowo podmienić poniższy blok na realne wywołanie API, np.:
  //   const res = await fetch('/api/auth/login', { method: 'POST', body: JSON.stringify({login, password}) });
  var form = document.getElementById('login-form');
  var submitBtn = document.getElementById('submit-btn');
  var btnLabel = submitBtn.querySelector('.btn-label');
  var message = document.getElementById('form-message');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add('is-loading');
    btnLabel.textContent = 'Logowanie…';
    message.textContent = '';

    setTimeout(function () {
      sessionStorage.setItem('sternik_authenticated', 'true');
      window.location.href = 'panel.html';
    }, 500);
  });
</script>

</body>
</html>
